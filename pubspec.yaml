name: alu_connect
description: "ALU Connect - Student engagement and collaboration platform for African Leadership University."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.3.2
  google_fonts: ^6.2.1
  provider: ^6.1.2
  intl: ^0.19.0
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.2.0+3
  image_picker: ^1.1.2
  timeago: ^3.7.0
  carousel_slider: ^5.0.0
  flutter_animate: ^4.5.0
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
